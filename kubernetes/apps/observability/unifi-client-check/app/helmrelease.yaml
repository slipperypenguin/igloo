---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unifi-client-check
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  interval: 1h
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      unifi-client-check:
        containers:
          app:
            image:
              repository: zsamuels28/unificlientalerts
              tag: v3.1.1@sha256:c3a5a27b9e5fbc6b0c51391c168594316cd248b08c8d512685122eb8113626f6
            env:
              CHECK_INTERVAL: "300"
              NOTIFICATION_SERVICE: Pushover
              REQUIRE_IP: "true"
              TZ: America/Los_Angeles
              UNIFI_CONTROLLER_URL: https://192.168.1.1
            envFrom:
              - secretRef:
                  name: unifi-client-check-secret
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    persistence:
      data:
        existingClaim: unifi-client-check
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
