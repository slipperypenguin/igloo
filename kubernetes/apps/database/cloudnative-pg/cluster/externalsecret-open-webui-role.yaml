# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-role
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: open-webui-role-secret
    template:
      data:
        # CNPG managed.roles passwordSecret expects exactly these two keys
        username: "{{ .DB_USER }}"
        password: "{{ .DB_PASS }}"
  dataFrom:
    - extract:
        key: open-webui
