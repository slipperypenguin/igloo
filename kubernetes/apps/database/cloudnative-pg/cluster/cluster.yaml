---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: igloo-pg
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-minimal-trixie
  primaryUpdateStrategy: unsupervised
  postgresql:
    extensions:
      - name: pgvector
        image:
          reference: ghcr.io/cloudnative-pg/pgvector:0.8.1-18-trixie
    parameters:
      # Connection limits
      max_connections: "200"
      # Memory — tuned for dell-node-02 (32GB total, ~2GB for PG)
      shared_buffers: "512MB"
      effective_cache_size: "1536MB"
      maintenance_work_mem: "128MB"
      work_mem: "16MB"
      # WAL settings for streaming replication performance
      wal_buffers: "16MB"
      min_wal_size: "512MB"
      max_wal_size: "1GB"
      # Checkpointing
      checkpoint_completion_target: "0.9"
      # Logging
      log_min_duration_statement: "1000"  # log queries > 1s

  bootstrap:
    initdb:
      database: app
      owner: app
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector
        - CREATE EXTENSION IF NOT EXISTS pg_trgm
        - CREATE EXTENSION IF NOT EXISTS btree_gin

  superuserSecret:
    name: cloudnative-pg-secret

  storage:
    size: 50Gi
    storageClass: ceph-block

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi

  monitoring:
    enablePodMonitor: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: igloo-pg-r2

  managed:
    roles:
    - name: open_webui
      login: true
      createdb: false
      inherit: true
      passwordSecret:
        name: open-webui-role-secret

  # Node affinity — prefer dell-node-02 for database workloads
  # affinity:
  #   nodeSelector:
  #     kubernetes.io/hostname: dell-node-02
