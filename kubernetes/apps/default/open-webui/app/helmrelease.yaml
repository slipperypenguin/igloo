# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.1@sha256:03d2b006989f0fe6559391a0c5d4ccac12688d7813d23cb4de86e5cc0ab22978
            env:
              TZ: America/Los_Angeles
              WEBUI_NAME: "igloo AI"
              WEBUI_URL: "https://open-webui.${SECRET_DOMAIN}"
              CORS_ALLOW_ORIGIN: "https://open-webui.${SECRET_DOMAIN}"
              # ── PostgreSQL backend
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: DATABASE_URL
              VECTOR_DB: pgvector
              # ── JWT signing
              WEBUI_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: WEBUI_SECRET_KEY
              # ── AI providers
              ANTHROPIC_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: ANTHROPIC_API_KEY
              ENABLE_OLLAMA_API: "false"
              ENABLE_OPENAI_API: "false"
              # ── RAG embeddings (local CPU, no API key needed)
              # Downloads all-MiniLM-L6-v2 (~90MB) on first startup.
              RAG_EMBEDDING_ENGINE: ""
              ENABLE_RAG_HYBRID_SEARCH: "true"  # BM25 + vector, needs pg_trgm
              # ── Features (disabled until infrastructure exists)
              ENABLE_RAG_WEB_SEARCH: "false" # TODO: add SearXNG in a later PR
              ENABLE_IMAGE_GENERATION: "false"
              ENABLE_VERSION_UPDATE_CHECK: "false" # Renovate handles this
              # ── Signup / auth
              # IMPORTANT: Keep "true" for first deploy so admin account can be created.
              # TODO: After first login, set to "false"
              ENABLE_SIGNUP: "true"
              DEFAULT_USER_ROLE: "user"

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  # 30 × 10s = 5 min ceiling for initial model download
                  failureThreshold: 30

            securityContext:
              allowPrivilegeEscalation: false
              # false required: writes to /app/backend/data and cache dirs
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            port: 8080

    route:
      app:
        hostnames:
          - "open-webui.${SECRET_DOMAIN}"
          - chat.igloo.sh
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https

    persistence:
      data:
        existingClaim: open-webui
        globalMounts:
          - path: /app/backend/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
