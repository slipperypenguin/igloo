# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: open-webui-secret
    template:
      data:
        DATABASE_URL: "postgresql://{{ .OW_DB_USER }}:{{ .OW_DB_PASS }}@igloo-pg-rw.database.svc.cluster.local:5432/{{ .OW_DB_NAME }}"
        WEBUI_SECRET_KEY: "{{ .WEBUI_SECRET_KEY }}"
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
  data:
    - secretKey: OW_DB_USER
      remoteRef:
        key: open-webui
        property: DB_USER
    - secretKey: OW_DB_PASS
      remoteRef:
        key: open-webui
        property: DB_PASS
    - secretKey: OW_DB_NAME
      remoteRef:
        key: open-webui
        property: DB_NAME
    - secretKey: WEBUI_SECRET_KEY
      remoteRef:
        key: open-webui
        property: WEBUI_SECRET_KEY
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: litellm
        property: LITELLM_MASTER_KEY
