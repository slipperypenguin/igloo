# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: open-webui-secret
    template:
      data:
        # ── postgres-init: app credentials
        INIT_POSTGRES_HOST:       "igloo-pg-rw.database.svc.cluster.local"
        INIT_POSTGRES_DBNAME: "{{ .DB_NAME }}"
        INIT_POSTGRES_USER: "{{ .DB_USER }}"
        INIT_POSTGRES_PASS: "{{ .DB_PASS }}"
        # ── postgres-init: superuser (for GRANT and CREATE EXTENSION)
        INIT_POSTGRES_SUPER_USER: "{{ .CNPG_SUPERUSER_USERNAME }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .CNPG_SUPERUSER_PASSWORD }}"
        # ── init-ext: superuser URL for extension creation
        SUPERUSER_DATABASE_URL: "postgresql://{{ .CNPG_SUPERUSER_USERNAME }}:{{ .CNPG_SUPERUSER_PASSWORD }}@igloo-pg-rw.database.svc.cluster.local:5432/{{ .DB_NAME }}"
        # ── open-webui runtime
        DATABASE_URL: "postgresql://{{ .DB_USER }}:{{ .DB_PASS }}@igloo-pg-rw.database.svc.cluster.local:5432/{{ .DB_NAME }}"
        WEBUI_SECRET_KEY: "{{ .WEBUI_SECRET_KEY }}"
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"
  dataFrom:
    - extract:
        key: open-webui      # WEBUI_SECRET_KEY, DB_USER, DB_PASS, DB_NAME, ANTHROPIC_API_KEY
    - extract:
        key: cloudnative-pg  # CNPG_SUPERUSER_USERNAME, CNPG_SUPERUSER_PASSWORD (same item as igloo-pg cluster)
