general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

model_list:
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: poolside/laguna-m.1
    litellm_params:
      model: openai/poolside/laguna-m.1
      api_base: https://inference.poolside.ai/v1
      api_key: os.environ/POOLSIDE_API_KEY

  - model_name: poolside/laguna-xs.2
    litellm_params:
      model: openai/poolside/laguna-xs.2
      api_base: https://inference.poolside.ai/v1
      api_key: os.environ/POOLSIDE_API_KEY
