---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: ceph-csi-drivers
      version: "1.0.1"
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  # Rook-recommended values — the chart fails on its own defaults.
  # Driver name prefix MUST equal the rook operator namespace (rook-ceph)
  values:
    operatorConfig:
      namespace: rook-ceph
      driverSpecDefaults:
        controllerPlugin:
          priorityClassName: system-cluster-critical
        imageSet:
          name: rook-csi-operator-image-set-configmap
        nodePlugin:
          priorityClassName: system-node-critical
    drivers:
      rbd:
        enabled: true
        name: rook-ceph.rbd.csi.ceph.com
        snapshotPolicy: volumeSnapshot
        controllerPlugin:
          replicas: 2
      cephfs:
        enabled: false
        name: rook-ceph.cephfs.csi.ceph.com
      nfs:
        enabled: false
        name: rook-ceph.nfs.csi.ceph.com
      nvmeof:
        enabled: false
        name: rook-ceph.nvmeof.csi.ceph.com
